name: Build & Release

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GLFW
        run: vcpkg install glfw3:x64-windows
      - name: Build
        shell: bash
        run: |
          gcc main.c src/main_state.c src/glad/glad.c -o SheepMeadow.exe \
            -Wall -DGLFW_INCLUDE_NONE \
            -I. -I./include \
            -L"C:/vcpkg/installed/x64-windows/lib" \
            -I"C:/vcpkg/installed/x64-windows/include" \
            -lglfw3 -lopengl32 -lgdi32 -luser32 -lshell32
      - name: Package
        shell: bash
        run: |
          mkdir release
          cp SheepMeadow.exe release/
          cp C:/vcpkg/installed/x64-windows/bin/glfw3.dll release/ || true
          cp -r res release/
      - name: Zip
        run: Compress-Archive -Path release/* -DestinationPath SheepMeadow-Windows.zip
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: SheepMeadow-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GLFW
        run: brew install glfw
      - name: Build
        run: |
          gcc main.c src/main_state.c src/glad/glad.c -o SheepMeadow \
            -Wall -DGLFW_INCLUDE_NONE \
            -I. -I./include \
            -lglfw \
            -framework OpenGL -framework Cocoa -framework IOKit
      - name: Package
        run: |
          mkdir release
          cp SheepMeadow release/
          cp -r res release/
          cd release && zip -r ../SheepMeadow-macOS.zip .
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: SheepMeadow-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl1-mesa-dev
      - name: Build
        run: |
          gcc main.c src/main_state.c src/glad/glad.c -o SheepMeadow \
            -Wall -DGLFW_INCLUDE_NONE \
            -I. -I./include \
            -lglfw -ldl -lm -lGL
      - name: Package
        run: |
          mkdir release
          cp SheepMeadow release/
          cp -r res release/
          cd release && zip -r ../SheepMeadow-Linux.zip .
      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: SheepMeadow-Linux.zip
